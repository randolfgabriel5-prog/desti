<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEHEHEHEH💖</title>
<style>
  body {
    margin: 0; padding: 0; overflow: hidden;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background-color: #ffd6e8; 
    display: flex; justify-content: center; align-items: center;
    height: 100vh; transition: background-color 1s ease; 
    position: relative; user-select: none; touch-action: manipulation;
  }

  .slideshow-container {
    position: relative;
    width: 340px; height: 500px;
    cursor: pointer; perspective: 1000px;
    border-radius: 25px;
    box-shadow: 0 15px 45px rgba(255, 105, 180, 0.3);
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(8px);
    animation: float 3s ease-in-out infinite alternate;
    z-index: 10;
  }

  .image-wrapper {
    width: 100%; height: 100%;
    border-radius: 25px; overflow: hidden;
    position: absolute; top: 0; left: 0;
  }

  .image-wrapper img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }

  @keyframes float { 
    0% { transform: translateY(0px) rotate(0deg); } 
    100% { transform: translateY(-15px) rotate(1deg); } 
  }

  .text-box {
    position: absolute; bottom: -100px; width: 100%;
    text-align: center; pointer-events: none;
  }

  .message {
    font-size: 20px; font-weight: bold; color: #ff4f81;
    margin: 0; opacity: 0; transition: opacity 0.5s ease;
  }

  .lyrics {
    font-size: 16px; font-style: italic; color: #ff85a1;
    margin-top: 5px; opacity: 0; transition: opacity 0.5s ease;
  }

  .show { opacity: 1; }

  .tap-hint {
    position: absolute; top: -50px; width: 100%;
    text-align: center; color: #ff4f81; font-size: 16px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1); }
  }

  .frame {
    position: absolute; top: -10px; left: -10px;
    width: calc(100% + 4px); height: calc(100% + 4px);
    border: 8px solid #ffffff; border-radius: 35px;
    box-shadow: 0 0 15px rgba(255,182,193,0.5);
    pointer-events: none; z-index: 15;
  }

  .heart {
    position: absolute; font-size: 25px; pointer-events: none;
    animation: rise 1.5s ease-out forwards; z-index: 20;
  }
  @keyframes rise { 
    0% { transform: translateY(0) scale(0.5); opacity: 1; } 
    100% { transform: translateY(-250px) scale(1.5); opacity: 0; } 
  }

  /* Transition Animations */
  .fade { animation: fadeIn 0.6s ease forwards; }
  .flip { animation: flipIn 0.7s ease forwards; }
  .zoom { animation: zoomIn 0.6s ease forwards; }
  .rotate { animation: rotateIn 0.7s ease forwards; }
  .slide { animation: slideIn 0.6s ease forwards; }
  .scale { animation: scaleIn 0.6s ease forwards; }

  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  @keyframes flipIn { from{transform:rotateY(90deg); opacity:0;} to{transform:rotateY(0deg); opacity:1;} }
  @keyframes zoomIn { from{transform:scale(0.3); opacity:0;} to{transform:scale(1); opacity:1;} }
  @keyframes rotateIn { from{transform:rotate(-180deg) scale(0); opacity:0;} to{transform:rotate(0deg) scale(1); opacity:1;} }
  @keyframes slideIn { from{transform:translateX(100px); opacity:0;} to{transform:translateX(0); opacity:1;} }
  @keyframes scaleIn { from{transform:scale(1.8); opacity:0;} to{transform:scale(1); opacity:1;} }
</style>
</head>
<body>

<div class="slideshow-container" id="slideshow">
  <div class="tap-hint" id="tapHint">Tap to play our song! 🎵</div>
  <div class="frame"></div>
  <div class="image-wrapper">
    <img id="slide" src="" alt="Love">
  </div>
  <div class="text-box">
    <p class="message" id="message"></p>
    <p class="lyrics" id="lyrics"></p>
  </div>
</div>

<audio id="bgMusic" src="/audio/this song is so cute.  _lyrics _fyp _foryoupage(MP3).mp3" loop></audio>

<script>
  const images = [
    '/picture/Screenshot_20260409_132648_com.ss.android.ugc.trill_edit_12453763313894.jpg',
    '/picture/Screenshot_20260409_132643_com.ss.android.ugc.trill_edit_12461959763526.jpg',
    '/picture/Screenshot_20260409_132637_com.ss.android.ugc.trill_edit_12470285725763.jpg',
    '/picture/Screenshot_20260409_132619_com.ss.android.ugc.trill_edit_12478939611697.jpg',
    '/picture/Screenshot_20260409_085353_com.ss.android.ugc.trill_edit_12304990763378.jpg',
    '/picture/Screenshot_20260408_231613_com.gbox.android.jpg',
    '/picture/Screenshot_20260408_231606_com.gbox.android.jpg'
  ];
  
  const messages = [
    "HAHAHAHHAAHA CUTE MO ❤️",
    "EWAN KOBA BAT ANG CUTE MO ✨",
    "AGHHHH CUTEEE MO SOBRA 💖",
    "CUTEEEEEEEEE 🌸",
    "SUPAA CUTEE 🌷",
    "HAHAHAHHAHAA POSAH 😊",
    "MATCHY MATCHY 🌟"
  ];

  const songLyrics = [
    "Girl, put your records on...",
    "Tell me your favorite song.",
    "You go ahead, let your hair down.",
    "Sapphire and faded jeans...",
    "I hope you get your dreams.",
    "Just go ahead...",
    "Let your hair down. ✨"
  ];
  
  const bgColors = ["#ffd6e8", "#ffe4f0", "#ffe0f5", "#fff0f5", "#ffe6f2", "#ffd6e8", "#ffe4f0"];
  const transitions = ['fade', 'flip', 'zoom', 'rotate', 'slide', 'scale', 'fade'];
  
  let index = 0;
  let musicStarted = false;

  const slide = document.getElementById('slide');
  const message = document.getElementById('message');
  const lyricsElem = document.getElementById('lyrics');
  const body = document.body;
  const music = document.getElementById('bgMusic');
  const tapHint = document.getElementById('tapHint');

  function updateContent() {
    slide.src = images[index];
    
    // Update Text
    message.classList.remove('show');
    lyricsElem.classList.remove('show');
    
    setTimeout(() => {
      message.textContent = messages[index];
      lyricsElem.textContent = songLyrics[index];
      message.classList.add('show');
      lyricsElem.classList.add('show');
    }, 250);
  }

  // Initial Load
  updateContent();

  document.getElementById('slideshow').addEventListener('click', () => {
    if (!musicStarted) {
      music.play();
      musicStarted = true;
      tapHint.style.display = "none";
    }
    
    index = (index + 1) % images.length;
    body.style.backgroundColor = bgColors[index];
    
    slide.className = ''; 
    void slide.offsetWidth; 
    slide.classList.add(transitions[index]);
    
    updateContent();
    spawnEffects();
  });

  function spawnEffects() {
    const symbols = ['❤️', '💖', '✨', '🌸'];
    for (let i = 0; i < 5; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.innerText = symbols[Math.floor(Math.random() * symbols.length)];
      h.style.left = (Math.random() * 80 + 10) + '%';
      h.style.top = (Math.random() * 50 + 20) + '%';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1500);
    }
  }
</script>
</body>
</html>
